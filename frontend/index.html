<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주 MBTI 분석</title>
  <style>
    /* ── 리셋 & 기본 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c63ff;
      --primary-dark: #4b44cc;
      --bg: #f5f4ff;
      --card: #ffffff;
      --text: #2d2b55;
      --muted: #888;
      --border: #e0deff;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(108,99,255,.12);
    }
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* ── 레이아웃 ── */
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      margin-bottom: 24px;
    }

    /* ── 헤더 ── */
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 2rem; color: var(--primary); letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: .95rem; }

    /* ── 폼 ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: .85rem; font-weight: 600; color: var(--text); }
    input, select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text);
      background: #fafafe;
      transition: border-color .2s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--primary); }

    #leap-month-row {
      display: none;
      align-items: center;
      gap: 10px;
      grid-column: 1 / -1;
    }
    #leap-month-row label { font-size: .9rem; font-weight: 500; cursor: pointer; }

    .btn-submit {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-submit:hover { background: var(--primary-dark); }
    .btn-submit:active { transform: scale(.98); }

    /* ── 로딩 ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 0;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: .95rem; }

    /* ── 에러 ── */
    #error-box {
      display: none;
      background: #fff0f0;
      border: 1.5px solid #ffb3b3;
      border-radius: 12px;
      padding: 16px 20px;
      color: #c0392b;
      margin-bottom: 16px;
      font-size: .95rem;
    }

    /* ── 결과 ── */
    #result-section { display: none; }
    .result-header { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: var(--primary); }

    /* 사주 원국 */
    .pillars-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }
    .pillar-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px 8px;
      text-align: center;
    }
    .pillar-label { font-size: .75rem; color: var(--muted); margin-bottom: 6px; }
    .pillar-value { font-size: 1.6rem; font-weight: 700; color: var(--primary); letter-spacing: 2px; }

    /* MBTI 배지 */
    .mbti-wrap { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    #mbti-badge {
      font-size: 2.8rem;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      border-radius: 16px;
      padding: 12px 28px;
      letter-spacing: 4px;
      box-shadow: 0 4px 16px rgba(108,99,255,.3);
    }
    .mbti-desc { color: var(--muted); font-size: .9rem; line-height: 1.6; }

    /* 확신도 바 */
    .confidence-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .conf-label { width: 60px; font-size: .8rem; font-weight: 600; flex-shrink: 0; }
    .conf-label:last-child { text-align: right; }
    .conf-bar-wrap {
      flex: 1;
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      height: 26px;
    }
    .conf-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .72rem;
      font-weight: 700;
      color: rgba(255,255,255,.85);
      transition: width .6s ease;
      min-width: 20px;
    }
    .conf-a { background: #a78bfa; }
    .conf-b { background: #d1d5db; color: #555; }
    .conf-a.winner { background: var(--primary); }
    .conf-b.winner { background: #6b7280; color: #fff; }

    /* 오행 */
    .elem-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .elem-name { width: 54px; font-size: .85rem; font-weight: 600; }
    .elem-bar-wrap { flex: 1; background: #f0eeff; border-radius: 6px; height: 18px; overflow: hidden; }
    .elem-bar { height: 100%; border-radius: 6px; transition: width .6s ease; }
    .elem-count { font-size: .8rem; color: var(--muted); width: 90px; text-align: right; }

    /* 해석 본문 */
    #interpretation {
      line-height: 1.8;
      font-size: .95rem;
      color: var(--text);
    }
    #interpretation h1, #interpretation h2 {
      margin: 20px 0 8px;
      color: var(--primary);
      font-size: 1.1rem;
    }
    #interpretation h3 {
      margin: 16px 0 6px;
      font-size: 1rem;
      color: #444;
    }
    #interpretation p { margin-bottom: 10px; }
    #interpretation ul { padding-left: 20px; margin-bottom: 10px; }
    #interpretation li { margin-bottom: 4px; }
    #interpretation strong { color: var(--primary-dark); }

    /* 섹션 구분선 */
    .section-title {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    hr { border: none; border-top: 1.5px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">

    <!-- 헤더 -->
    <header>
      <h1>🔮 사주 MBTI 분석</h1>
      <p>생년월일시를 입력하면 사주 기반 MBTI를 분석해 드립니다</p>
    </header>

    <!-- 입력 폼 -->
    <div class="card">
      <form id="saju-form" autocomplete="off">
        <div class="form-grid">

          <div class="form-group">
            <label for="year">연도</label>
            <input type="number" id="year" name="year" placeholder="예: 1995" min="1900" max="2100" required />
          </div>

          <div class="form-group">
            <label for="month">월</label>
            <select id="month" name="month" required>
              <option value="">선택</option>
              <option value="1">1월</option><option value="2">2월</option>
              <option value="3">3월</option><option value="4">4월</option>
              <option value="5">5월</option><option value="6">6월</option>
              <option value="7">7월</option><option value="8">8월</option>
              <option value="9">9월</option><option value="10">10월</option>
              <option value="11">11월</option><option value="12">12월</option>
            </select>
          </div>

          <div class="form-group">
            <label for="day">일</label>
            <input type="number" id="day" name="day" placeholder="1~31" min="1" max="31" required />
          </div>

          <div class="form-group">
            <label for="hour">시 (0~23)</label>
            <input type="number" id="hour" name="hour" placeholder="예: 14" min="0" max="23" required />
          </div>

          <div class="form-group">
            <label for="minute">분</label>
            <input type="number" id="minute" name="minute" placeholder="예: 30" min="0" max="59" value="0" />
          </div>

          <div class="form-group">
            <label for="gender">성별</label>
            <select id="gender" name="gender">
              <option value="M">남자</option>
              <option value="F">여자</option>
            </select>
          </div>

          <div class="form-group">
            <label for="calendar-type">양력 / 음력</label>
            <select id="calendar-type" name="calendar-type">
              <option value="0">양력</option>
              <option value="1">음력</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mode">분석 모드</label>
            <select id="mode" name="mode">
              <option value="combined">종합 (사주+MBTI)</option>
              <option value="saju">사주 해석만</option>
              <option value="mbti">MBTI만</option>
            </select>
          </div>

          <!-- 윤달 (음력 선택 시 표시) -->
          <div id="leap-month-row">
            <input type="checkbox" id="leap-month" name="leap-month" />
            <label for="leap-month">윤달입니까?</label>
          </div>

        </div>

        <button type="submit" class="btn-submit">✨ 사주 분석 시작</button>
      </form>
    </div>

    <!-- 로딩 -->
    <div id="loading">
      <div class="spinner"></div>
      <p>AI가 사주를 분석 중입니다... 잠시만 기다려 주세요 🔮</p>
    </div>

    <!-- 에러 -->
    <div id="error-box"></div>

    <!-- 결과 -->
    <div id="result-section">

      <!-- 사주 원국 -->
      <div class="card">
        <div class="section-title">사주 원국</div>
        <div class="pillars-grid">
          <div class="pillar-card">
            <div class="pillar-label">년주</div>
            <div class="pillar-value" id="pillar-year">-</div>
          </div>
          <div class="pillar-card">
            <div class="pillar-label">월주</div>
            <div class="pillar-value" id="pillar-month">-</div>
          </div>
          <div class="pillar-card">
            <div class="pillar-label">일주</div>
            <div class="pillar-value" id="pillar-day">-</div>
          </div>
          <div class="pillar-card">
            <div class="pillar-label">시주</div>
            <div class="pillar-value" id="pillar-hour">-</div>
          </div>
        </div>
      </div>

      <!-- MBTI -->
      <div class="card">
        <div class="section-title">MBTI 추정 결과</div>
        <div class="mbti-wrap">
          <div id="mbti-badge">-</div>
          <div class="mbti-desc">사주 구조 기반으로 추정된 MBTI 유형입니다.<br>아래 확신도를 참고해 주세요.</div>
        </div>

        <hr />

        <div class="section-title">축별 확신도</div>
        <div id="confidence-bars"></div>
      </div>

      <!-- 오행 -->
      <div class="card">
        <div class="section-title">오행 분포</div>
        <div id="five-elements"></div>
      </div>

      <!-- AI 해석 -->
      <div class="card">
        <div class="section-title">AI 해석</div>
        <div id="interpretation"></div>
      </div>

    </div><!-- /result-section -->

  </div><!-- /container -->

  <script type="module" src="./app.js"></script>
</body>
</html>
