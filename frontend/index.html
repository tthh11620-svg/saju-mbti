<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주 MBTI 분석</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="사주MBTI" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c63ff;
      --primary-dark: #4b44cc;
      --bg: #f5f4ff;
      --card: #ffffff;
      --text: #2d2b55;
      --muted: #888;
      --border: #e0deff;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(108,99,255,.12);
      --input-bg: #fafafe;
      --inactive-bg: #f5f5f5;
      --scale-inactive-bg: #f9f9f9;
      --scale-inactive-border: #eee;
      --bar-bg: #f0eeff;
      --interp-h3: #444;
    }
    [data-theme="dark"] {
      --primary: #8b83ff;
      --primary-dark: #6c63ff;
      --bg: #0f0e1a;
      --card: #1a1828;
      --text: #e8e6ff;
      --muted: #8884aa;
      --border: #2e2a4a;
      --shadow: 0 4px 24px rgba(0,0,0,.4);
      --input-bg: #221f36;
      --inactive-bg: #1e1c2e;
      --scale-inactive-bg: #1a1828;
      --scale-inactive-border: #2e2a4a;
      --bar-bg: #221f36;
      --interp-h3: #bbb8dd;
    }
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
      transition: background .3s, color .3s;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      margin-bottom: 24px;
    }

    /* ── 다크모드 토글 ── */
    .theme-toggle {
      position: fixed; top: 16px; right: 16px; z-index: 999;
      width: 44px; height: 44px;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; box-shadow: var(--shadow);
      transition: background .3s, border-color .3s;
    }
    .theme-toggle:hover { background: var(--bg); }

    /* ── 헤더 ── */
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 2.2rem; color: var(--primary); letter-spacing: -1px; }
    header p { color: var(--muted); margin-top: 8px; font-size: .95rem; }

    /* ── 폼 ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: .85rem; font-weight: 600; color: var(--text); }
    input, select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text);
      background: var(--input-bg);
      transition: border-color .2s, background .3s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--primary); }
    #leap-month-row { display: none; align-items: center; gap: 10px; grid-column: 1 / -1; }
    #leap-month-row label { font-size: .9rem; font-weight: 500; cursor: pointer; }
    .btn-submit {
      width: 100%; margin-top: 24px; padding: 14px;
      background: var(--primary); color: #fff;
      font-size: 1.05rem; font-weight: 700;
      border: none; border-radius: 12px; cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-submit:hover { background: var(--primary-dark); }
    .btn-submit:active { transform: scale(.98); }

    /* ── 로딩 ── */
    #loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid var(--border); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: .95rem; }

    /* ── 에러 ── */
    #error-box {
      display: none; background: #fff0f0;
      border: 1.5px solid #ffb3b3; border-radius: 12px;
      padding: 16px 20px; color: #c0392b; margin-bottom: 16px; font-size: .95rem;
    }

    /* ── 결과 공통 ── */
    #result-section { display: none; }
    .section-label {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--muted); margin-bottom: 16px;
    }
    .card-title {
      font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 4px;
    }
    .card-subtitle { font-size: .9rem; color: var(--muted); margin-bottom: 20px; }
    hr { border: none; border-top: 1.5px solid var(--border); margin: 20px 0; }

    /* ── 파트 1: 사주 원국 ── */
    .pillars-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;
    }
    .pillar-card {
      background: var(--bg); border-radius: 12px; padding: 14px 6px; text-align: center;
    }
    .pillar-pos { font-size: .7rem; color: var(--muted); margin-bottom: 4px; }
    .pillar-char { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
    .pillar-elem { font-size: .72rem; color: var(--muted); margin-top: 4px; }

    .daymaster-box {
      background: linear-gradient(135deg, #6c63ff15, #a78bfa20);
      border: 1.5px solid var(--border);
      border-radius: 12px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .daymaster-char {
      font-size: 3rem; font-weight: 900; color: var(--primary);
      width: 64px; height: 64px; background: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(108,99,255,.2); flex-shrink: 0;
    }
    .daymaster-info { flex: 1; }
    .daymaster-info .dm-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .daymaster-info .dm-desc { font-size: .85rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* ── 파트 2: MBTI ── */
    .mbti-hero {
      display: flex; align-items: center; gap: 24px;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      border-radius: 16px; padding: 24px 28px; margin-bottom: 24px;
    }
    #mbti-badge {
      font-size: 3rem; font-weight: 900; color: #fff;
      letter-spacing: 4px; flex-shrink: 0;
    }
    .mbti-hero-desc { color: rgba(255,255,255,.9); font-size: .95rem; line-height: 1.7; }
    .mbti-hero-desc strong { color: #fff; font-size: 1.05rem; }

    /* 축별 카드 */
    .axis-cards { display: flex; flex-direction: column; gap: 16px; }

    /* E/I — 큰 슬라이더 바 */
    .axis-card { border-radius: 14px; padding: 20px; border: 1.5px solid var(--border); }
    .axis-title {
      font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 4px;
    }
    .axis-winner-badge {
      display: inline-block; padding: 2px 10px;
      background: var(--primary); color: #fff;
      border-radius: 20px; font-size: .75rem; font-weight: 700; margin-left: 8px;
    }
    .axis-subtitle { font-size: .82rem; color: var(--muted); margin-bottom: 14px; }

    /* 바 스타일 (E/I, J/P) */
    .big-bar-wrap {
      position: relative; background: var(--bar-bg);
      border-radius: 8px; height: 32px; overflow: hidden; margin-bottom: 8px;
    }
    .big-bar-fill {
      height: 100%; border-radius: 8px;
      background: linear-gradient(90deg, var(--primary), #a78bfa);
      transition: width .8s ease;
      display: flex; align-items: center; justify-content: flex-end; padding-right: 10px;
    }
    .big-bar-fill span { color: #fff; font-size: .8rem; font-weight: 700; }
    .bar-labels { display: flex; justify-content: space-between; font-size: .8rem; }
    .bar-label-left { color: var(--primary); font-weight: 700; }
    .bar-label-right { color: var(--muted); }

    /* 카드 대비 스타일 (N/S) */
    .versus-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
    .versus-side {
      border-radius: 10px; padding: 12px; text-align: center;
      transition: all .3s;
    }
    .versus-side.active { background: var(--primary); color: #fff; }
    .versus-side.inactive { background: var(--inactive-bg); color: var(--muted); }
    .versus-side .vs-letter { font-size: 1.8rem; font-weight: 900; }
    .versus-side .vs-name { font-size: .75rem; margin-top: 2px; }
    .versus-side .vs-pct { font-size: 1rem; font-weight: 700; margin-top: 4px; }
    .versus-divider { font-size: 1.2rem; color: var(--muted); text-align: center; }

    /* 저울 스타일 (T/F) */
    .scale-wrap { display: flex; gap: 12px; }
    .scale-side {
      flex: 1; border-radius: 10px; padding: 14px 12px; text-align: center;
    }
    .scale-side.active { background: linear-gradient(135deg, #6c63ff20, #a78bfa30); border: 2px solid var(--primary); }
    .scale-side.inactive { background: var(--scale-inactive-bg); border: 1.5px solid var(--scale-inactive-border); }
    .scale-letter { font-size: 2rem; font-weight: 900; }
    .scale-side.active .scale-letter { color: var(--primary); }
    .scale-side.inactive .scale-letter { color: #ccc; }
    .scale-name { font-size: .78rem; margin-top: 2px; }
    .scale-side.active .scale-name { color: var(--text); }
    .scale-side.inactive .scale-name { color: var(--muted); }
    .scale-pct { font-size: .95rem; font-weight: 700; margin-top: 6px; }
    .scale-side.active .scale-pct { color: var(--primary); }
    .scale-side.inactive .scale-pct { color: #bbb; }

    /* ── 오행 ── */
    .elem-grid { display: flex; flex-direction: column; gap: 10px; }
    .elem-row { display: flex; align-items: center; gap: 10px; }
    .elem-name { width: 54px; font-size: .85rem; font-weight: 700; }
    .elem-bar-wrap { flex: 1; background: var(--bar-bg); border-radius: 6px; height: 20px; overflow: hidden; }
    .elem-bar { height: 100%; border-radius: 6px; transition: width .6s ease; }
    .elem-count { font-size: .8rem; color: var(--muted); width: 90px; text-align: right; }

    /* ── AI 해석 ── */
    #interpretation { line-height: 1.85; font-size: .95rem; color: var(--text); }
    #interpretation h1 { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin: 24px 0 10px; }
    #interpretation h2 { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin: 20px 0 8px; }
    #interpretation h3 { font-size: 1.05rem; font-weight: 700; color: var(--interp-h3); margin: 16px 0 6px; }
    #interpretation p { margin-bottom: 10px; }
    #interpretation ul { padding-left: 20px; margin-bottom: 10px; }
    #interpretation li { margin-bottom: 5px; }
    #interpretation strong { color: var(--primary-dark); }
  </style>
</head>
<body>
  <!-- 다크모드 토글 버튼 -->
  <button class="theme-toggle" id="theme-toggle" title="다크/라이트 모드 전환">🌙</button>

  <div class="container">

    <header>
      <h1>🔮 사주 MBTI 분석</h1>
      <p>태어난 순간의 기운으로 나를 읽어드립니다 ✨</p>
    </header>

    <div class="card">
      <form id="saju-form" autocomplete="off">
        <div class="form-grid">

          <div class="form-group">
            <label for="year">연도</label>
            <input type="number" id="year" placeholder="예: 1995" min="1900" max="2100" required />
          </div>

          <div class="form-group">
            <label for="month">월</label>
            <select id="month" required>
              <option value="">선택</option>
              <option value="1">1월</option><option value="2">2월</option>
              <option value="3">3월</option><option value="4">4월</option>
              <option value="5">5월</option><option value="6">6월</option>
              <option value="7">7월</option><option value="8">8월</option>
              <option value="9">9월</option><option value="10">10월</option>
              <option value="11">11월</option><option value="12">12월</option>
            </select>
          </div>

          <div class="form-group">
            <label for="day">일</label>
            <input type="number" id="day" placeholder="1~31" min="1" max="31" required />
          </div>

          <div class="form-group">
            <label for="hour">시 (0~23)</label>
            <input type="number" id="hour" placeholder="예: 14" min="0" max="23" required />
          </div>

          <div class="form-group">
            <label for="minute">분</label>
            <input type="number" id="minute" placeholder="0" min="0" max="59" value="0" />
          </div>

          <div class="form-group">
            <label for="gender">성별</label>
            <select id="gender">
              <option value="M">남자</option>
              <option value="F">여자</option>
            </select>
          </div>

          <div class="form-group">
            <label for="calendar-type">양력 / 음력</label>
            <select id="calendar-type">
              <option value="0">양력</option>
              <option value="1">음력</option>
            </select>
          </div>

          <div id="leap-month-row">
            <input type="checkbox" id="leap-month" />
            <label for="leap-month">윤달입니까?</label>
          </div>

        </div>
        <button type="submit" class="btn-submit">✨ 지금 내 사주 분석하기</button>
      </form>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <p>천문을 계산하는 중입니다... 잠시만요 🌙</p>
    </div>

    <div id="error-box"></div>

    <div id="result-section">

      <!-- 파트 1: 사주 원국 -->
      <div class="card">
        <div class="section-label">📋 파트 1 · 사주 원국</div>
        <div class="card-title" id="part1-title">-</div>
        <div class="card-subtitle" id="part1-subtitle">-</div>

        <div class="pillars-grid">
          <div class="pillar-card">
            <div class="pillar-pos">년주 🌱</div>
            <div class="pillar-char" id="pillar-year">-</div>
            <div class="pillar-elem" id="pillar-year-elem"></div>
          </div>
          <div class="pillar-card">
            <div class="pillar-pos">월주 🌸</div>
            <div class="pillar-char" id="pillar-month">-</div>
            <div class="pillar-elem" id="pillar-month-elem"></div>
          </div>
          <div class="pillar-card">
            <div class="pillar-pos">일주 ⭐</div>
            <div class="pillar-char" id="pillar-day">-</div>
            <div class="pillar-elem" id="pillar-day-elem"></div>
          </div>
          <div class="pillar-card">
            <div class="pillar-pos">시주 🌙</div>
            <div class="pillar-char" id="pillar-hour">-</div>
            <div class="pillar-elem" id="pillar-hour-elem"></div>
          </div>
        </div>

        <div class="daymaster-box">
          <div class="daymaster-char" id="dm-char">-</div>
          <div class="daymaster-info">
            <div class="dm-name" id="dm-name">-</div>
            <div class="dm-desc" id="dm-desc">-</div>
          </div>
        </div>

        <hr />
        <div class="section-label">🌊 오행 분포</div>
        <div class="elem-grid" id="five-elements"></div>
      </div>

      <!-- 파트 2: MBTI -->
      <div class="card">
        <div class="section-label">🧠 파트 2 · 사주 기반 MBTI</div>

        <div class="mbti-hero">
          <div id="mbti-badge">-</div>
          <div class="mbti-hero-desc" id="mbti-hero-desc">
            <strong>사주 구조로 분석한 나의 유형</strong><br>
            오행과 십성의 흐름이 당신의 행동 패턴을 말해줍니다.
          </div>
        </div>

        <div class="axis-cards" id="axis-cards"></div>
      </div>

      <!-- AI 해석 -->
      <div class="card">
        <div class="section-label">💬 AI 종합 해석</div>
        <div id="interpretation"></div>
      </div>

    </div>

  </div>

  <script type="module" src="./app.js"></script>
  <script>
    // 다크모드 토글
    const toggle = document.getElementById("theme-toggle");
    const saved = localStorage.getItem("theme");
    if (saved === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
      toggle.textContent = "☀️";
    }
    toggle.addEventListener("click", () => {
      const isDark = document.documentElement.getAttribute("data-theme") === "dark";
      if (isDark) {
        document.documentElement.removeAttribute("data-theme");
        toggle.textContent = "🌙";
        localStorage.setItem("theme", "light");
      } else {
        document.documentElement.setAttribute("data-theme", "dark");
        toggle.textContent = "☀️";
        localStorage.setItem("theme", "dark");
      }
    });

    // 서비스워커
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
