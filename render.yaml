services:
  - type: web
    name: saju-mbti-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
      - key: PYTHON_VERSION
        value: "3.11"
